<!DOCTYPE html>
<html>
<head>
  <title>Mechanic Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container" id="container">

  <!-- SIGN UP -->
  <div class="form-container sign-up">
    <form id="signupForm">
      <h1>Mechanic Signup 🔧</h1>

      <input type="text" id="signupName" placeholder="Name" required>
      <input type="email" id="signupEmail" placeholder="Email" required>
      <input type="password" id="signupPassword" placeholder="Password" required>
      <input type="text" id="skills" placeholder="Skills">
      <input type="text" id="location" placeholder="Location">

      <button type="submit">Sign Up</button>
    </form>
  </div>

  <!-- LOGIN -->
  <div class="form-container sign-in">
    <form id="loginForm">
      <h1>Mechanic Login 🔧</h1>

      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>

      <button type="submit">Login</button>
    </form>
  </div>

  <!-- TOGGLE PANEL -->
  <div class="toggle-container">
    <div class="toggle">

      <div class="toggle-panel toggle-left">
        <h1>Welcome Back!</h1>
        <p>Already a mechanic? Login here</p>
        <button class="hidden" id="login">Login</button>
      </div>

      <div class="toggle-panel toggle-right">
        <h1>Hello Mechanic!</h1>
        <p>Register yourself to start working</p>
        <button class="hidden" id="register">Sign Up</button>
      </div>

    </div>
  </div>

</div>

<script src="mechanic_login.js"></script>
</body>
</html>
